name: Build APK

# Triggers on every push and PR to any branch, plus a manual button.
on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:    # adds a "Run workflow" button on the Actions tab

# Allow the workflow to write a release if you ever tag one
permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Build debug APK (also useful for sideloading)
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Locate APK artifacts
        id: locate
        run: |
          REL=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          DBG=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          echo "release_apk=$REL" >> $GITHUB_OUTPUT
          echo "debug_apk=$DBG" >> $GITHUB_OUTPUT
          ls -lh "$REL" "$DBG" || true

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SalinaHM-release-apk
          path: ${{ steps.locate.outputs.release_apk }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SalinaHM-debug-apk
          path: ${{ steps.locate.outputs.debug_apk }}
          if-no-files-found: error
          retention-days: 30
